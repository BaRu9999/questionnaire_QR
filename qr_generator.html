<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード作成用</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #f7f1e5;
      color: #2e261c;
      margin: 0;
      padding: 24px;
    }
    .box {
      max-width: 560px;
      margin: 0 auto;
      background: #fffdf8;
      border: 1px solid #d8c6a2;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 14px 35px rgba(60, 42, 24, 0.14);
    }
    h1 {
      font-size: 22px;
      margin: 0 0 14px;
    }
    p {
      line-height: 1.8;
      color: #6d604e;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d8c6a2;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2f5d46;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .qr {
      margin-top: 20px;
      text-align: center;
    }
    .qr img {
      width: 260px;
      height: 260px;
      background: #fff;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid #d8c6a2;
    }
    .small {
      font-size: 12px;
      color: #6d604e;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>店頭POP用 QRコード作成</h1>
    <p>
      GitHub Pagesで公開されたアンケートページのURLを入力してください。<br>
      例：https://ユーザー名.github.io/kuchikomi_qr_system/
    </p>

    <input id="urlInput" type="url" placeholder="ここに公開URLを入力">
    <button onclick="makeQR()">QRコードを表示</button>

    <div id="qrArea" class="qr"></div>

    <p class="small">
      表示されたQRコード画像を長押しまたは右クリックで保存し、POPに配置してください。
    </p>
  </div>

  <script>
    function makeQR() {
      const url = document.getElementById("urlInput").value.trim();
      const qrArea = document.getElementById("qrArea");

      if (!url) {
        qrArea.innerHTML = "<p>URLを入力してください。</p>";
        return;
      }

      const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=600x600&margin=18&data=" + encodeURIComponent(url);
      qrArea.innerHTML = `
        <img src="${qrUrl}" alt="QRコード">
        <p><a href="${qrUrl}" target="_blank" rel="noopener">QRコード画像を別タブで開く</a></p>
      `;
    }
  </script>
</body>
</html>
